  <!-- 🧂 Contenido principal -->
  <section class="categorias-pagina contenedor">
    <h1 class="titulo-seccion">🍴 Categorías de recetas</h1>
    <p class="descripcion-seccion">Explora nuestras categorías y encuentra el tipo de receta que más te gusta.</p>

    <div class="rejilla-categorias">

      <!-- Cada tarjeta enlaza a su página de categoría -->
      @defer (when categorias.length > 0) {
        @for (categoria of categorias; track $index) {
          <app-cardcategoria [categoria]="categoria"></app-cardcategoria>
        }
      } @placeholder {
        <p>Cargando categorías...</p>
      }

    </div>
  </section>
