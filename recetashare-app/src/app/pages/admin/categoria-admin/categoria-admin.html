<!-- Texto informativo de la página -->
<p>Pagina de administracion de categorias</p>

<div>
  <!-- Botón que cambia el estado a "agregar" para mostrar el formulario -->
  <button (click)="agregarCategoria()">Agregar Categoria</button>
</div>

<!-- Control de vistas usando @switch según el valor de 'estado' -->
@switch (estado) {

  <!-- ==========================================================
       ESTADO 0: Mostrar lista de categorías existentes
       ========================================================== -->
  @case (0) {
    <div class="container"> 
      <div>Categorias disponibles</div>

      <!-- @defer: carga diferida hasta que existan elementos en el array -->
      @defer (when categorias.length > 0){

        <!-- Componente tabla para mostrar todas las categorías -->
        <app-categoria-tabla
          [categorias]="categorias"
          (editarCategoriaEvent)="onEditarCategoria($event)"   
          (eliminarCategoriaEvent)="onEliminarCategoria($event)" 
        ></app-categoria-tabla>

      } @placeholder {
        <!-- Mensaje mostrado mientras no hay categorías o mientras cargan -->
        <p>No hay categorias ingresadas.</p>
      }
    </div>
  }

  <!-- ==========================================================
       ESTADO 1: Vista para agregar una nueva categoría
       ========================================================== -->
  @case (1) {
    <div class="container">
      <div>Agregando</div>

      <!-- Formulario (reutilizable) para crear una categoría -->
      <app-categoria-form
        (guardarCategoria)="onGuardar($event)"   
        (cancelarAccion)="onCancelar()"          
        [categoria]="categoria"                 
      ></app-categoria-form>
    </div>
  }

  <!-- ==========================================================
       ESTADO 2: Vista para editar una categoría
       ========================================================== -->
  @case (2) {
    <div class="container">
      <div>Editando</div>

      <!-- Mismo formulario, pero cargando la categoría existente -->
      <app-categoria-form
        (guardarCategoria)="onGuardar($event)"
        (cancelarAccion)="onCancelar()"
        [categoria]="categoria"                 
      ></app-categoria-form>
    </div>
  }

  <!-- ==========================================================
       ESTADO 3: Vista para confirmar eliminación
       (Podría personalizarse más adelante)
       ========================================================== -->
  @case (3) {
    <div class="container">
      <div>Confirmar Eliminacion</div>

      <!-- Formulario reutilizado también aquí -->
      <app-categoria-form
        (guardarCategoria)="onGuardar($event)"
        (cancelarAccion)="onCancelar()"
        [categoria]="categoria"
      ></app-categoria-form>
    </div>
  }

  <!-- ==========================================================
       ESTADO 4: Vista de carga / procesamiento
       ========================================================== -->
  @case (4) {
    <div class="container">
      <div>Procesando...</div>
    </div>
  }
}
