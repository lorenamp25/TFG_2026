<div class="tarjeta-receta">
  <div class="imagen-receta">
    <img src="/tacos.jpg" alt="Tacos de pollo">
    <div class="etiqueta-receta">Nuevo</div>
  </div>
  <div class="contenido-receta">
    <div class="meta-receta">
      <span class="tiempo-receta">⏱️ 25 min</span>
      <span class="dificultad-receta">Fácil</span>
    </div>
      <!-- Título de la receta -->
    <h3>{{ receta.titulo }}</h3>
      <!-- Descripción corta de la receta -->
    <p>{{ receta.descripcion }}</p>
    <div class="pie-receta">
      <div class="autor-receta">
        <img src="/tacos.jpg" alt="Autor">
        <span>Por Ana López</span>
      </div>
      <div class="valoracion-receta">⭐️ 4.8</div>
    </div>
  </div>
</div>
