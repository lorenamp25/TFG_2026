  <div class="container">

    <ul id="categoryList">
      @for (categoria of categorias; track $index) {
      <li>
        <span class="category-name">{{ categoria.nombre }}</span>
        <div class="actions">
          <button class="edit" (click)="onEditar(categoria)">✏️</button>
          <button class="delete" (click)="onEliminar(categoria)">🗑️</button>
        </div>
      </li>
      }
    </ul>

  </div>
