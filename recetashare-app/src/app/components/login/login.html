<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recetas Mágicas — Login</title>
</head>
<body class="bg-page">
  <main class="centered-card">
    <div class="brand">
      <div class="logo">🍴</div>
      <h1>RecetasMágicas</h1>
      <p class="subtitle">Tu comunidad culinaria favorita</p>
    </div>

    <div class="card">
      <h2>Iniciar Sesión</h2>
      <p class="muted">Bienvenido de vuelta</p>

      <label for="email">Correo electrónico</label>
      <input id="email" type="email" placeholder="tucorreo@ejemplo.com">

      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••">

      <div class="row between">
        <label><input id="remember" type="checkbox"> Recordarme</label>
        <a class="link" href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button id="btnLogin" class="btn primary">Iniciar Sesión</button>

      <p class="small">¿No tienes cuenta? <a href="#" class="link">Regístrate aquí</a></p>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
