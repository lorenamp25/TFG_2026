<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"> <!-- Codificación estándar UTF-8 para caracteres especiales -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace la página responsive en móviles -->
  <title>Iniciar sesión | RecetasApp</title> <!-- Título de la pestaña del navegador -->
  <!-- Fuente bonita desde Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Contenedor principal del bloque de login/registro -->
  <div class="contenedor-login">
    <!-- Icono / logo de la app -->
    <div class="logo">🍪</div>
    <!-- Nombre de la aplicación -->
    <h1>RecetasApp</h1>
    <!-- Texto que cambia según si estamos en login o registro -->
    <p id="texto-form">Inicia sesión para descubrir nuevas recetas cada día.</p>

    <!-- Formulario principal de login/registro -->
    <form id="form-login">
      <!-- Campo de correo -->
      <input type="email" placeholder="Correo electrónico" required>
      <!-- Campo de contraseña -->
      <input type="password" placeholder="Contraseña" required>
      <!-- Botón de enviar (iniciar sesión o registrarse según el modo) -->
      <button type="submit" class="boton-formulario">Iniciar sesión</button>
    </form>

    <!-- Enlace para cambiar entre "Iniciar sesión" y "Registrarse" -->
    <div class="alternar">
      ¿No tienes cuenta? <a href="#" id="link-registrar">Regístrate</a>
    </div>
  </div>

  <!-- Pie de página sencillo -->
  <footer>© 2025 RecetasApp — Hecho con ❤️ para amantes de la cocina</footer>
  
</body>
</html>
