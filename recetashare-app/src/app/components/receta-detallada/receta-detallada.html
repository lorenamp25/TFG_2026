<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Receta — Detalle</title>
</head>
<body>
  <!-- ======== HEADER ======== -->
  <header class="topbar">
    <div class="left">
      <span class="logo-sm">🍴</span>
      <span class="brand-name">RecetasMágicas</span>
    </div>
    <div class="right">
      <button id="btnBack" class="btn ghost">Volver</button>
      <button id="btnLogout2" class="btn ghost">Salir</button>
      <button id="themeToggle" class="btn ghost">🌙</button>
    </div>
  </header>

  <!-- ======== CONTENIDO ======== -->
  <main class="container">
    <article class="recipe-detail" id="recipeContent">
      <!-- El contenido se rellenará dinámicamente -->
    </article>
  </main>

  <!-- ======== SCRIPTS ======== -->
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script>
    // --- Datos de recetas (puedes añadir o modificar los enlaces e info aquí) ---
    const recetas = {
      paella: {
        titulo: "Paella Valenciana Tradicional",
        autor: "Carmen López",
        duracion: "45 min",
        dificultad: "Intermedio",
        imagen: "tacos.jpg",
        descripcion: "La auténtica paella valenciana con pollo, conejo, judías verdes y azafrán.",
        ingredientes: [
          "500 g de arroz bomba",
          "400 g de pollo troceado",
          "300 g de conejo",
          "200 g de judías verdes planas",
          "1 tomate maduro rallado",
          "1 litro de caldo de pollo",
          "Hebras de azafrán",
          "Aceite de oliva virgen extra",
          "Sal al gusto"
        ],
        pasos: [
          "Sella el pollo y el conejo en la paellera.",
          "Añade las verduras y sofríe unos minutos.",
          "Agrega el tomate rallado y deja reducir.",
          "Incorpora el arroz y remueve durante 2 minutos.",
          "Añade el caldo caliente con el azafrán.",
          "Cocina 18 minutos y deja reposar."
        ]
      },
      pizza: {
        titulo: "Pizza Margarita Italiana",
        autor: "Luca Rossi",
        duracion: "30 min",
        dificultad: "Fácil",
        imagen: "tacos.jpg",
        descripcion: "Una pizza clásica italiana con base crujiente, salsa de tomate, mozzarella y albahaca fresca.",
        ingredientes: [
          "250 g de harina 00",
          "150 ml de agua",
          "5 g de levadura seca",
          "100 g de salsa de tomate",
          "125 g de mozzarella fresca",
          "Hojas de albahaca fresca",
          "Aceite de oliva virgen extra",
          "Sal al gusto"
        ],
        pasos: [
          "Prepara la masa mezclando harina, agua, levadura y sal.",
          "Deja reposar 1 hora.",
          "Extiende la masa y añade la salsa y el queso.",
          "Hornea a 220°C durante 10-12 minutos.",
          "Agrega albahaca fresca al servir."
        ]
      },
      tiramisu: {
        titulo: "Tiramisú Clásico Italiano",
        autor: "Giulia Bianchi",
        duracion: "25 min + enfriado",
        dificultad: "Fácil",
        imagen: "tacos.jpg",
        descripcion: "Postre tradicional italiano con capas de mascarpone, café y cacao.",
        ingredientes: [
          "250 g de queso mascarpone",
          "2 huevos",
          "60 g de azúcar",
          "Bizcochos de soletilla",
          "Café fuerte",
          "Cacao en polvo sin azúcar"
        ],
        pasos: [
          "Bate las yemas con el azúcar y añade el mascarpone.",
          "Monta las claras a punto de nieve y mezcla suavemente.",
          "Empapa los bizcochos en café y haz capas con la crema.",
          "Espolvorea cacao y enfría al menos 4 horas."
        ]
      }
    };

    // --- Obtener ID de receta desde la URL ---
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    // --- Seleccionar el contenedor ---
    const content = document.getElementById("recipeContent");

    // --- Si existe la receta, mostrarla ---
    if (recetas[id]) {
      const r = recetas[id];
      content.innerHTML = `
        <h1>${r.titulo}</h1>
        <p class="muted">por ${r.autor} • ${r.duracion} • ${r.dificultad}</p>
        <img src="${r.imagen}" alt="${r.titulo}" class="recipe-img">
        <section>
          <h3>Descripción</h3>
          <p>${r.descripcion}</p>
        </section>
        <section>
          <h3>Ingredientes</h3>
          <ul>${r.ingredientes.map(i => `<li>${i}</li>`).join("")}</ul>
        </section>
        <section>
          <h3>Preparación</h3>
          <ol>${r.pasos.map(p => `<li>${p}</li>`).join("")}</ol>
        </section>
      `;
    } else {
      content.innerHTML = `<h2>No se encontró la receta 😢</h2>`;
    }

    // --- Navegación y logout ---
    document.getElementById('btnBack').addEventListener('click', () => {
      location.href = 'recetas.html';
    });
    document.getElementById('btnLogout2').addEventListener('click', () => {
      localStorage.removeItem('RM_token');
      location.href = 'index.html';
    });
  </script>
</body>
</html>
