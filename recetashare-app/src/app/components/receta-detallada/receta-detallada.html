<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" /> <!-- Codificación de caracteres UTF-8 -->
  <meta name="viewport" content="width=device-width,initial-scale=1" /> <!-- Hace la página responsive en móviles -->
  <title>Receta — Detalle</title> <!-- Título de la pestaña del navegador -->
</head>
<body>
  <!-- ======== HEADER ======== -->
  <!-- Barra superior con logo y botones de navegación -->
  <header class="topbar">
    <div class="left">
      <!-- Icono pequeño de la app -->
      <span class="logo-sm">🍴</span>
      <!-- Nombre de la marca o aplicación -->
      <span class="brand-name">RecetasMágicas</span>
    </div>
    <div class="right">
      <!-- Botón para volver a la página anterior de recetas -->
      <button id="btnBack" class="btn ghost">Volver</button>
      <!-- Botón para cerrar sesión -->
      <button id="btnLogout2" class="btn ghost">Salir</button>
      <!-- Botón para cambiar el tema (claro/oscuro) -->
      <button id="themeToggle" class="btn ghost">🌙</button>
    </div>
  </header>

  <!-- ======== CONTENIDO ======== -->
  <!-- Contenedor principal del contenido -->
  <main class="container">
    <!-- Artículo donde se inyectará el detalle de la receta -->
    <article class="recipe-detail" id="recipeContent">
      <!-- El contenido se rellenará dinámicamente -->
    </article>
  </main>

  <!-- ======== SCRIPTS ======== -->
  <!-- Script de autenticación (comprobación de login, etc.) -->
  <script src="js/auth.js"></script>
  <!-- Script de tema (cambio claro/oscuro) -->
  <script src="js/theme.js"></script>

  <script>
    // --- Datos de recetas (puedes añadir o modificar los enlaces e info aquí) ---
    // Objeto que guarda varias recetas simuladas con su información
    const recetas = {
      paella: {
        titulo: "Paella Valenciana Tradicional",          // Título de la receta
        autor: "Carmen López",                            // Nombre del autor
        duracion: "45 min",                               // Tiempo estimado
        dificultad: "Intermedio",                         // Nivel de dificultad
        imagen: "tacos.jpg",                              // Imagen asociada (ruta)
        descripcion: "La auténtica paella valenciana con pollo, conejo, judías verdes y azafrán.",
        ingredientes: [                                   // Lista de ingredientes
          "500 g de arroz bomba",
          "400 g de pollo troceado",
          "300 g de conejo",
          "200 g de judías verdes planas",
          "1 tomate maduro rallado",
          "1 litro de caldo de pollo",
          "Hebras de azafrán",
          "Aceite de oliva virgen extra",
          "Sal al gusto"
        ],
        pasos: [                                          // Pasos de preparación
          "Sella el pollo y el conejo en la paellera.",
          "Añade las verduras y sofríe unos minutos.",
          "Agrega el tomate rallado y deja reducir.",
          "Incorpora el arroz y remueve durante 2 minutos.",
          "Añade el caldo caliente con el azafrán.",
          "Cocina 18 minutos y deja reposar."
        ]
      },
      pizza: {
        titulo: "Pizza Margarita Italiana",
        autor: "Luca Rossi",
        duracion: "30 min",
        dificultad: "Fácil",
        imagen: "tacos.jpg",
        descripcion: "Una pizza clásica italiana con base crujiente, salsa de tomate, mozzarella y albahaca fresca.",
        ingredientes: [
          "250 g de harina 00",
          "150 ml de agua",
          "5 g de levadura seca",
          "100 g de salsa de tomate",
          "125 g de mozzarella fresca",
          "Hojas de albahaca fresca",
          "Aceite de oliva virgen extra",
          "Sal al gusto"
        ],
        pasos: [
          "Prepara la masa mezclando harina, agua, levadura y sal.",
          "Deja reposar 1 hora.",
          "Extiende la masa y añade la salsa y el queso.",
          "Hornea a 220°C durante 10-12 minutos.",
          "Agrega albahaca fresca al servir."
        ]
      },
      tiramisu: {
        titulo: "Tiramisú Clásico Italiano",
        autor: "Giulia Bianchi",
        duracion: "25 min + enfriado",
        dificultad: "Fácil",
        imagen: "tacos.jpg",
        descripcion: "Postre tradicional italiano con capas de mascarpone, café y cacao.",
        ingredientes: [
          "250 g de queso mascarpone",
          "2 huevos",
          "60 g de azúcar",
          "Bizcochos de soletilla",
          "Café fuerte",
          "Cacao en polvo sin azúcar"
        ],
        pasos: [
          "Bate las yemas con el azúcar y añade el mascarpone.",
          "Monta las claras a punto de nieve y mezcla suavemente.",
          "Empapa los bizcochos en café y haz capas con la crema.",
          "Espolvorea cacao y enfría al menos 4 horas."
        ]
      }
    };

    // --- Obtener ID de receta desde la URL ---
    // Ejemplo: detalle.html?id=paella → id = "paella"
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id"); // Recupera el valor del parámetro "id" de la query

    // --- Seleccionar el contenedor ---
    // Elemento <article> donde se va a inyectar el contenido HTML de la receta
    const content = document.getElementById("recipeContent");

    // --- Si existe la receta, mostrarla ---
    if (recetas[id]) {
      // Si el id existe dentro del objeto recetas, se obtiene la receta r
      const r = recetas[id];

      // Se construye un bloque HTML usando template literals con los datos de la receta
      content.innerHTML = `
        <h1>${r.titulo}</h1>
        <p class="muted">por ${r.autor} • ${r.duracion} • ${r.dificultad}</p>
        <img src="${r.imagen}" alt="${r.titulo}" class="recipe-img">
        <section>
          <h3>Descripción</h3>
          <p>${r.descripcion}</p>
        </section>
        <section>
          <h3>Ingredientes</h3>
          <ul>${r.ingredientes.map(i => `<li>${i}</li>`).join("")}</ul>
        </section>
        <section>
          <h3>Preparación</h3>
          <ol>${r.pasos.map(p => `<li>${p}</li>`).join("")}</ol>
        </section>
      `;
    } else {
      // Si el id de la URL no coincide con ninguna receta definida
      content.innerHTML = `<h2>No se encontró la receta 😢</h2>`;
    }

    // --- Navegación y logout ---
    // Botón "Volver" → vuelve a la página de listado de recetas
    document.getElementById('btnBack').addEventListener('click', () => {
      location.href = 'recetas.html';
    });

    // Botón "Salir" → borra el token de login y vuelve a la portada
    document.getElementById('btnLogout2').addEventListener('click', () => {
      localStorage.removeItem('RM_token'); // Elimina el token de sesión almacenado
      location.href = 'index.html';       // Redirige a la página principal
    });
  </script>
</body>
</html>
