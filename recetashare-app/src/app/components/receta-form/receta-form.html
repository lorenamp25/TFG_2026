<!-- Formulario reactivo, enlazado al FormGroup "form" -->
<form [formGroup]="form" (ngSubmit)="onGrabar()">

  <!-- Campo oculto para el ID de la receta -->
  <input type="hidden" formControlName="id" />


  <!-- =====================================================
       TÍTULO DE LA RECETA
       ===================================================== -->
  <div class="form-group">
    <label for="titulo">Título</label>

    <!-- Input enlazado al control 'titulo' -->
    <input id="titulo" type="text" formControlName="titulo" placeholder="Ej: Tarta de queso" />
  </div>


  <!-- =====================================================
       DESCRIPCIÓN
       ===================================================== -->
  <div class="form-group">
    <label for="descripcion">Descripción</label>

    <!-- Textarea enlazada al formControl 'descripcion' -->
    <textarea id="descripcion" formControlName="descripcion" name="descripcion"
      placeholder="Describe brevemente la receta" rows="3"></textarea>
  </div>


  <!-- =====================================================
       TIEMPO DE PREPARACIÓN
       ===================================================== -->
  <div class="form-group">
    <label for="tiempo_preparacion">Tiempo de preparación (minutos)</label>

    <input id="tiempo_preparacion" type="number" min="1" max="999" formControlName="tiempo_preparacion"
      name="tiempo_preparacion" placeholder="Ej: 45" />
  </div>


  <!-- =====================================================
       DIFICULTAD (RADIO BUTTONS)
       ===================================================== -->
  <div class="form-group">
    <label>Dificultad</label>

    <!-- Grupo de radios que comparten el mismo formControlName -->
    <div class="radio-group">
      <label>
        <input type="radio" formControlName="dificultad" id="dificultad" name="dificultad" value="baja" />
        <span>Baja</span>
      </label>

      <label>
        <input type="radio" formControlName="dificultad" id="dificultad" name="dificultad" value="media" />
        <span>Media</span>
      </label>

      <label>
        <input type="radio" formControlName="dificultad" id="dificultad" name="dificultad" value="alta" />
        <span>Alta</span>
      </label>
    </div>
  </div>


  <!-- =====================================================
       CATEGORÍA (SELECT)
       ===================================================== -->
  <div class="form-group">
    <label for="categoria">Categoría</label>

    <!-- Desplegable con categorías cargadas desde la BD -->
    <select id="categoria" formControlName="categoria">
      <option value="" disabled selected>Selecciona categoría</option>

      <!-- Bucle que genera las categorías -->
      @for (categoria of categorias; track categoria.id) {
      <option [value]="categoria.id">{{ categoria.nombre }}</option>
      }
    </select>
  </div>


  <!-- =====================================================
       IMAGEN DE LA RECETA (FILE + PREVIEW)
       ===================================================== -->
  <div class="form-group">
    <label for="imagen">Imagen de la receta</label>

    <!-- Input para subir archivos -->
    <input id="imagen" type="file" accept="image/*" (change)="onImagenSeleccionada($event)" />

    <!-- Vista previa solo si existe una imagen cargada -->
    @if (receta && receta.imagen_preview) {
    <img [src]="receta.imagen_preview" alt="Vista previa" class="preview-img" />
    }
  </div>


  <!-- =====================================================
       USUARIO (SOLO LECTURA)
       ===================================================== -->
  <div class="form-group">
    <label for="usuario">Nombre del Usuario</label>

    <!-- ngModel independiente, porque no forma parte del formGroup -->
    <input id="usuario" type="text" readonly [(ngModel)]="receta!.usuario!.nombre"
      [ngModelOptions]="{ standalone: true }" />
  </div>


  <!-- =====================================================
       INGREDIENTES (TABLA DINÁMICA)
       ===================================================== -->
  <div>
    <table id="tabla-ingredientes">
      <thead>
        <tr>
          <th>Ingrediente</th>
          <th>Cantidad</th>
          <th>Unidad</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <!-- Bucle para cada ingrediente -->
        @for (ingrediente of receta!.ingredientes; track $index) {
        <tr>
          <!-- Selector de ingrediente -->
          <td>
            <select [(ngModel)]="ingrediente.ingrediente.id" name="nombre-{{ $index }}"
              [ngModelOptions]="{ standalone: true }">
              <option value="" disabled>Seleccione un ingrediente</option>

              <!-- Opciones: ingredientes disponibles -->
              @for (ingrediente of ingredientes; track $index) {
              <option [value]="ingrediente.id">{{ ingrediente.nombre }}</option>
              }
            </select>
          </td>

          <!-- Cantidad -->
          <td>
            <input type="number" min="0" [(ngModel)]="ingrediente.cantidad" name="cantidad-{{ $index }}"
              placeholder="Ej: 200" [ngModelOptions]="{ standalone: true }" />
          </td>

          <!-- Unidad -->
          <td>
            <input type="text" [(ngModel)]="ingrediente.unidad" name="unidad-{{ $index }}" placeholder="Ej: gramos"
              [ngModelOptions]="{ standalone: true }" />
          </td>

          <!-- Botón eliminar ingrediente -->
          <td>
            <button type="button" (click)="eliminarIngrediente($index)">
              Eliminar
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>
    @if (ingredientesError) {
    <div class="error">{{ ingredientesError }}</div>
    }

    <!-- Añadir nueva fila -->
    <button type="button" (click)="agregarIngrediente()">
      Agregar Ingrediente
    </button>
  </div>


  <!-- =====================================================
       INSTRUCCIONES (TABLA DINÁMICA)
       ===================================================== -->
  <div>
    <table id="tabla-instrucciones">
      <thead>
        <tr>
          <th>Instrucción</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <!-- Bucle de instrucciones -->
        @for (instruccion of receta!.instrucciones; track $index) {
        <tr>
          <!-- Texto de la instrucción -->
          <td>
            <textarea [(ngModel)]="instruccion.descripcion" name="instruccion-{{ $index }}"
              placeholder="Describe la instrucción" rows="2" [ngModelOptions]="{ standalone: true }"></textarea>
          </td>

          <!-- Botón eliminar instrucción -->
          <td>
            <button type="button" (click)="eliminarInstruccion($index)">
              Eliminar
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>

    <!-- Añadir nueva instrucción -->
    <button type="button" (click)="agregarInstruccion()">
      Agregar Instrucción
    </button>
  </div>


  <!-- =====================================================
       BOTONES DE ACCIÓN
       ===================================================== -->
  <div class="form-buttons">
    <!-- Submit deshabilitado si el formulario es inválido -->
    <button type="submit" [disabled]="form.invalid">Confirmar</button>

    <!-- Cancelar vuelve atrás o resetea -->
    <button type="button" (click)="onCancelar()">Cancelar</button>
  </div>
</form>
